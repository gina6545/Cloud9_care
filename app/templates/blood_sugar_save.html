{% extends "base.html" %}

{% block title %}Cloud9 Care - 혈당 기록{% endblock %}

{% block head %}
<style>
    .health-profile-page-container {
        display: flex;
        gap: 20px;
        align-items: center;
        justify-content: center;
        height: 100%;
    }

    .health-profile-page-container .bp-chart-card{
        height: 500px;
        width: 500px;
    }
    .health-profile-page-container .bp-chart-card #bpChart{
        height: 500px;
        width: 500px;
        background-color: white;
        padding: 10px;
    }

    .health-profile-page-container .section-card {
        background: #ffffff;
        padding: 25px;
        margin-bottom: 165px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .health-profile-page-container h3 {
        margin-bottom: 20px;
        color: #1e293b;
    }

    .health-profile-page-container .form-group {
        margin-bottom: 15px;
    }

    .health-profile-page-container label {
        font-weight: 600;
        display: block;
        margin-bottom: 5px;
        color: #475569;
    }

    .health-profile-page-container input,
    .health-profile-page-container select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        box-sizing: border-box;
        font-size: 16px;
    }

    .health-profile-page-container .blood_sugar_save {
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        background-color: #2d6cdf;
        color: white;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .health-profile-page-container .blood_sugar_save:hover {
        background-color: #1e4ea1;
    }

    .back-link {
        margin-bottom: 20px;
        display: inline-flex;
        align-items: center;
        color: #64748b;
        text-decoration: none;
        font-weight: 500;
    }

    .back-link:hover {
        color: #2d6cdf;
    }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
{% endblock %}

{% block content %}
<div class="health-profile-page-container">
    <!-- 왼쪽 그래프 -->
    <div class="bp-chart-card">
        <h3>최근 30일 혈압</h3>
        <canvas id="bpChart"></canvas>
    </div>
    
    <div class="bp-layout">
        
        <a href="/health-profile" class="back-link">← 건강정보로 돌아가기</a>

        <div class="section-card">
            <h3>혈당 기록 추가</h3>

            <div class="form-group">
                <label>혈당 (mg/dL)</label>
                <input type="number" step="0.1" class="glucose_mg_dl" name="glucose_mg_dl" placeholder="예: 95" required>
            </div>
            <div class="form-group">
                <label>측정 상황</label>
                <select name="measure_type" required>
                    <option style="display: none;">측정 상황 선택</option>
                    <option>임의</option>
                    <option>공복</option>
                    <option>식후 2시간</option>
                    <option>취침 전</option>
                </select>
            </div>
            <button class="blood_sugar_save">저장하기</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 공통 API 요청 함수는 base.html에서 제공됨

    document.querySelector(".blood_sugar_save").addEventListener("click", async () => {
        const glucose_mg_dl = document.querySelector(".glucose_mg_dl").value;
        const measure_type = document.querySelector("select[name='measure_type']").value;

        if (!glucose_mg_dl) {
            alert("혈당 (mg/dL) 기록해주세요.")
            return;
        }
        if (measure_type == '측정 상황 선택' || !measure_type) {
            alert("측정 상황 선택해주세요.")
            return;
        }

        const data = {
            glucose_mg_dl: glucose_mg_dl,
            measure_type: measure_type
        }
        console.log(data)

        const response = await fetchWithAuth('/api/v1/health/blood-sugar', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        if (!response) return;

        if (response.status === 409) {
            const result = await response.json();
            alert(result.detail);
            return;
        }

        if (!response.ok) {
            console.error("API Error:", response.status);
            alert("에러가 발생했습니다.");
            return;
        }

        const result = await response.json();
        alert("혈당 기록이 저장되었습니다.");
        location.href = "/health-profile"
    })

    // 공통 API 요청 함수 (토큰 만료 시 자동 갱신 로직 포함)
    async function fetchWithAuth(url, options = {}) {
        let accessToken = localStorage.getItem("access_token");
        const id = localStorage.getItem("user_id");
        if (!options.headers) options.headers = {};
        if (accessToken) {
            options.headers["Authorization"] = `Bearer ${accessToken}`;
        }
        let response = await fetch(url, options);
        // 토큰이 만료되었을 때 (401) 자동 갱신 시도
        if (response.status === 401) {
            console.log("액세스 토큰 만료, 갱신 시도 중...");
            const refreshResponse = await fetch('/api/v1/users/token/refresh', { method: 'GET' });
            if (refreshResponse.ok) {
                const result = await refreshResponse.json();
                accessToken = result.access_token;
                localStorage.setItem("access_token", accessToken);
                // 새 토큰으로 원래 요청 재시도
                options.headers["Authorization"] = `Bearer ${accessToken}`;
                response = await fetch(url, options);
            } else {
                // 리프레시 토큰도 만료된 경우
                alert("세션이 만료되었습니다. 다시 로그인해주세요.");
                localStorage.removeItem("access_token");
                localStorage.removeItem("user_id");
                location.href = "/login";
                return null;
            }
        }
        return response;
    }

    async function loadBloodSugarChart() {
        const token = localStorage.getItem("access_token");

        // 1. API 호출 (혈당 데이터)
        const response = await fetchWithAuth(`/api/v1/health/blood-sugar`, { method: 'GET' });

        if (!response || !response.ok) {
            console.error("데이터 조회 실패");
            return;
        }

        const result = await response.json();

        // 2. 라벨 가공 (30개 데이터 대응)
        const labels = result.map((v, index) => {
            const date = new Date(v.created_at);
            
            // 데이터가 30개이므로 5개 단위(약 2~3일 간격)로만 라벨을 표시
            if (index % 5 !== 0 && index !== result.length - 1) return "";

            return new Intl.DateTimeFormat('ko-KR', {
                month: '2-digit',
                day: '2-digit'
            }).format(date);
        });

        // 3. 데이터 추출 (변수명 일치시킴)
        const glucoseValues = result.map(v => v.glucose_mg_dl);

        const ctx = document.getElementById('bpChart'); // ID가 bpChart라면 그대로 유지

        // 4. 차트 생성
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: '혈당 (mg/dL)',
                        data: glucoseValues, // 위에서 정의한 변수명과 일치시켜야 함
                        borderColor: '#3b82f6', // 혈당은 보통 파란색 계열 사용
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 2 // 점 크기를 줄여서 30개가 덜 복잡해보이게 함
                    },
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' },
                    tooltip: {
                        // 툴팁 디자인 및 내용 설정
                        backgroundColor: 'rgba(0, 0, 0, 0.8)', // 배경색 진하게
                        padding: 10,
                        callbacks: {
                            // 1. 툴팁 제목: 날짜와 시간을 상세히 표시
                            title: function(context) {
                                const index = context[0].dataIndex;
                                const data = result[index];
                                const date = new Date(data.created_at);
                                
                                // 포맷 예시: 2026. 03. 06. 오후 01:18
                                return date.toLocaleString('ko-KR', {
                                    year: 'numeric',
                                    month: 'long',
                                    day: 'numeric',
                                    hour: '2-digit',
                                    minute: '2-digit',
                                    hour12: true
                                });
                            },
                            // 2. 툴팁 본문: 측정 타입(공복/식후)과 수치 표시
                            label: function(context) {
                                const index = context.dataIndex;
                                const data = result[index];
                                const label = data.measure_type || "기록"; // '공복' 또는 '식후 2시간' 등
                                const value = context.parsed.y;
                                
                                return ` ${label}: ${value} mg/dL`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: {
                            maxRotation: 0,
                            autoSkip: true,
                            maxTicksLimit: 7 // X축 라벨 개수 제한 (겹침 방지)
                        }
                    },
                    y: {
                        beginAtZero: false,
                        suggestedMin: 70
                    }
                }
            }
        });
    }

    loadBloodSugarChart();
</script>
{% endblock %}
