<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>☁️ Cloud9 Care - 건강한 일상의 시작</title>
    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Pretendard Variable", Pretendard, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background:
                radial-gradient(circle at top left, rgba(151, 118, 255, 0.16), transparent 26%),
                radial-gradient(circle at bottom right, rgba(245, 185, 255, 0.18), transparent 24%),
                linear-gradient(180deg, #faf6ff 0%, #f7f1ff 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .landing-container {
            max-width: 920px;
            width: 100%;
            background: rgba(255, 255, 255, 0.90);
            border: 1px solid #f1ebfb;
            border-radius: 28px;
            box-shadow: 0 20px 42px rgba(76, 29, 149, 0.12);
            backdrop-filter: blur(12px);
            overflow: hidden;
        }

        .landing-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0;
        }

        .landing-left {
            position: relative;
            background: linear-gradient(155deg, #7a6df0 0%, #7c5fe8 36%, #8b5cf6 68%, #9f6cf4 100%);
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .landing-left::after {
            content: "";
            position: absolute;
            right: -50px;
            bottom: -50px;
            width: 220px;
            height: 220px;
            border-radius: 999px;
            background: rgba(255, 214, 244, 0.18);
            filter: blur(10px);
        }

        .landing-left h1 {
            position: relative;
            z-index: 1;
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 20px;
            line-height: 1.2;
            word-break: keep-all;
        }

        .landing-left p {
            position: relative;
            z-index: 1;
            font-size: 16px;
            line-height: 1.7;
            opacity: 0.95;
            margin-bottom: 30px;
            word-break: keep-all;
        }

        .features {
            position: relative;
            z-index: 1;
            list-style: none;
            margin-bottom: 40px;
            padding: 0;
        }

        .features li {
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            line-height: 1.6;
        }

        .features li:before {
            content: "✓";
            width: 24px;
            height: 24px;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.16);
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0;
        }

        .landing-right {
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: rgba(255, 255, 255, 0.88);
            backdrop-filter: blur(10px);
        }

        .landing-right h2 {
            font-size: 28px;
            color: #1f1733;
            margin-bottom: 30px;
            text-align: center;
            font-weight: 800;
        }

        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            padding: 14px 24px;
            border: 1px solid transparent;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            text-align: center;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #7568f4 0%, #8656f3 52%, #9d63f7 100%);
            color: white;
            box-shadow: 0 12px 24px rgba(134, 86, 243, 0.24);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 16px 28px rgba(134, 86, 243, 0.30);
        }

        .btn-secondary {
            background: #ffffff;
            color: #475569;
            border-color: #ddd0ff;
        }

        .btn-secondary:hover {
            background: #f8f5ff;
            border-color: #c8b5ff;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #9b93b0;
            font-size: 14px;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .landing-content {
                grid-template-columns: 1fr;
            }

            .landing-left {
                padding: 40px 30px;
            }

            .landing-right {
                padding: 40px 30px;
            }

            .landing-left h1 {
                font-size: 32px;
            }

            .landing-right h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="landing-content">
            <div class="landing-left">
                <h1>☁️ 구름 위에 오른 듯한 건강한 일상</h1>
                <p>의료 기록을 이해하기 쉬운 맞춤형 건강 가이드로 연결합니다.</p>
                <ul class="features">
                    <li>AI 기반 맞춤형 건강 가이드</li>
                    <li>복약 알람 및 건강 추적</li>
                    <li>실시간 건강 상담 챗봇</li>
                    <li>처방전 자동 분석</li>
                </ul>
            </div>
            <div class="landing-right">
                <h2>시작하기</h2>
                <div class="auth-buttons">
                    <a href="/login" class="btn btn-primary">로그인</a>
                    <div class="divider">또는</div>
                    <a href="/signup" class="btn btn-secondary">회원가입</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 로그인 상태면 랜딩에 머물지 않고 대시보드로
        const token = localStorage.getItem('access_token');
        if (token) window.location.replace('/dashboard');
    </script>
</body>
</html>
