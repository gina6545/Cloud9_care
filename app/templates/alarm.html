<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <title>복용 알람 - Cloud9 Care</title>
  <link rel="stylesheet" href="/static/common.css">
  <link rel="stylesheet" href="/static/chatbot.css">
</head>

<body>
  <header class="header">
    <div class="header-left">☁️ Cloud9 Care</div>
    <div class="header-right">
      <input class="search" placeholder="search">
      <button>Button</button>
      <button>➕</button>
      <div class="user-menu">
        <button class="user-menu-btn" id="user-menu-btn">👤</button>
        <div class="user-dropdown" id="user-dropdown">
          <a href="/signup">회원가입</a>
          <a href="/login">로그인</a>
          <a href="/mypage">마이페이지</a>
        </div>
      </div>
    </div>
  </header>

  <div class="container">
    <aside class="sidebar">
      <a href="/"><button>대시보드</button></a>
      <a href="/guide"><button>생활 안내 가이드</button></a>
      <a href="/alarm"><button style="background: #eef2ff; border-color: #4f46e5; font-weight: bold;">복용 알람</button></a>
      <a href="/prescription-upload"><button>처방전 및 약물</button></a>
      <div class="sidebar-footer">
        <a href="/mypage"><button>👤 마이페이지</button></a>
      </div>
    </aside>

    <main class="main">
      <div class="page-title">복용 알람</div>
      <div class="flex">
        <div class="column box">
          <h4>현재 복용 중인 약물</h4>
          <div id="med-list">
            <p style="text-align: center; color: #6b7280;">로딩 중...</p>
          </div>
        </div>
        <div class="column box">
          <h4 id="detail-title">약물을 선택하세요</h4>
          <div id="alarm-detail">
            <p style="text-align: center; color: #6b7280; padding: 40px;">왼쪽에서 약물을 선택하면 알람을 설정할 수 있습니다.</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <button id="chatbot-button" class="chatbot-button">🤖</button>
  <div id="chatbot-container" class="chatbot-container">
    <div class="chatbot-header">
      <h3>💬 챗봇</h3>
      <div class="chatbot-header-buttons">
        <button id="chatbot-tts" class="chatbot-tts">🔊</button>
        <button id="chatbot-end" class="chatbot-end">🗑️</button>
        <button id="chatbot-close" class="chatbot-close">×</button>
      </div>
    </div>
    <div id="chatbot-messages" class="chatbot-messages"></div>
    <div class="chatbot-input">
      <input id="chatbot-input" type="text" placeholder="메시지 입력...">
      <button id="chatbot-send" class="chatbot-send">➤</button>
    </div>
  </div>

  <script src="/static/common.js"></script>
  <script src="/static/chatbot.js"></script>
  <script src="/static/alarm.js"></script>
  
  <style>
    .alarm-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px;
      margin: 10px 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
    }
    .alarm-info { flex: 1; }
    .alarm-name { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
    .alarm-time { color: #6b7280; font-size: 14px; }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 24px;
      background: #d1d5db;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle-switch.active { background: #4f46e5; }
    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      top: 2px;
      left: 2px;
      transition: left 0.3s;
    }
    .toggle-switch.active::after { left: 28px; }
    .btn-delete {
      background: #ef4444;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      margin-left: 10px;
    }
    .btn-add {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .med-item {
      padding: 10px;
      margin: 8px 0;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s;
    }
    .med-item:hover {
      background: #f3f4f6;
    }
    .med-item.selected {
      background: #eef2ff;
      border-color: #4f46e5;
    }
    .alarm-time-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      margin: 8px 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
    }
    .btn-add-time {
      width: 100%;
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</body>

</html>
