{% extends "base.html" %}

{% block title %}Cloud9 Care - 혈압 기록{% endblock %}

{% block head %}
<style>
    .health-profile-page-container {
        max-width: 800px;
        margin: 40px auto;
        padding: 30px;
        display: flex;
        flex-flow: column;
    }

    .health-profile-page-container .section-card {
        background: #ffffff;
        padding: 25px;
        margin-bottom: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .health-profile-page-container h3 {
        margin-bottom: 20px;
        color: #1e293b;
    }

    .health-profile-page-container .form-group {
        margin-bottom: 15px;
    }

    .health-profile-page-container label {
        font-weight: 600;
        display: block;
        margin-bottom: 5px;
        color: #475569;
    }

    .health-profile-page-container input,
    .health-profile-page-container select {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e2e8f0;
        box-sizing: border-box;
        font-size: 16px;
    }

    .health-profile-page-container .blood_pressure_save {
        padding: 12px 24px;
        border-radius: 8px;
        border: none;
        background-color: #2d6cdf;
        color: white;
        font-weight: 600;
        font-size: 16px;
        cursor: pointer;
        transition: background-color 0.2s;
    }

    .health-profile-page-container .blood_pressure_save:hover {
        background-color: #1e4ea1;
    }

    .back-link {
        margin-bottom: 20px;
        display: inline-flex;
        align-items: center;
        color: #64748b;
        text-decoration: none;
        font-weight: 500;
    }

    .back-link:hover {
        color: #2d6cdf;
    }
</style>
{% endblock %}

{% block content %}
<div class="health-profile-page-container">
    <a href="/health-profile" class="back-link">← 건강정보로 돌아가기</a>

    <div class="section-card">
        <h3>혈압 기록 추가</h3>
        <div class="form-group">
            <label>수축기 (mmHg)</label>
            <input type="number" class="systolic" name="systolic" placeholder="예: 120" required>
        </div>

        <div class="form-group">
            <label>이완기 (mmHg)</label>
            <input type="number" class="diastolic" name="diastolic" placeholder="예: 80" required>
        </div>

        <div class="form-group">
            <label>측정 시각</label>
            <select class="bp_measure_type" required>
                <option style="display: none;">측정 시각 선택</option>
                <option >아침</option>
                <option >저녁</option>
                <option >임의</option>
            </select>
        </div>

        <button class="blood_pressure_save">저장하기</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // 공통 API 요청 함수 (토큰 만료 시 자동 갱신 로직 포함)
    async function fetchWithAuth(url, options = {}) {
        let accessToken = localStorage.getItem("access_token");
        const id = localStorage.getItem("user_id");
        if (!options.headers) options.headers = {};
        if (accessToken) {
            options.headers["Authorization"] = `Bearer ${accessToken}`;
        }
        let response = await fetch(url, options);
        // 토큰이 만료되었을 때 (401) 자동 갱신 시도
        if (response.status === 401) {
            console.log("액세스 토큰 만료, 갱신 시도 중...");
            const refreshResponse = await fetch('/api/v1/users/token/refresh', { method: 'GET' });
            if (refreshResponse.ok) {
                const result = await refreshResponse.json();
                accessToken = result.access_token;
                localStorage.setItem("access_token", accessToken);
                // 새 토큰으로 원래 요청 재시도
                options.headers["Authorization"] = `Bearer ${accessToken}`;
                response = await fetch(url, options);
            } else {
                // 리프레시 토큰도 만료된 경우
                alert("세션이 만료되었습니다. 다시 로그인해주세요.");
                localStorage.removeItem("access_token");
                localStorage.removeItem("user_id");
                location.href = "/login";
                return null;
            }
        }
        return response;
    }

    document.querySelector(".blood_pressure_save").addEventListener("click", async () => {
        const systolic = document.querySelector(".systolic").value;
        const diastolic = document.querySelector(".diastolic").value;
        const measure_type = document.querySelector(".bp_measure_type").value;

        if (!systolic) {
            alert("수축기 (mmHg) 기록해주세요.")
            return;
        }
        if (!diastolic) {
            alert("이완기 (mmHg) 기록해주세요.")
            return;
        }
        if (measure_type == '측정 시각 선택' || !measure_type) {
            alert("측정 시각 선택해주세요.")
            return;
        }

        const data = {
            systolic: systolic,
            diastolic: diastolic,
            measure_type: measure_type
        }

        const response = await fetchWithAuth('/api/v1/health/blood-pressure', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });

        if (!response) return;

        if (response.status === 409) {
            const result = await response.json();
            alert(result.detail);
            return;
        }

        if (!response.ok) {
            console.error("API Error:", response.status);
            alert("에러가 발생했습니다.");
            return;
        }

        const result = await response.json();
        alert("혈압 기록이 저장되었습니다.");
        location.href = "/health-profile"
    })
</script>
{% endblock %}
