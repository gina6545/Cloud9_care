{% extends "base.html" %}

{% block title %}Cloud9 Care - 생활 안내 가이드{% endblock %}

{% block head %}
<style>
    /* 컨테이너 */
    .plan-container {
        background: #fff;
        border-radius: 30px;
        padding: 30px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        max-width: 600px;
        margin: 20px auto;
        border: 1px solid #f0f0f0;
    }

    /* 헤더 영역 */
    .plan-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 20px;
    }

    .plan-title-area h2 {
        font-size: 24px;
        color: #333;
        margin: 0 0 8px 0;
    }

    .plan-subtitle {
        font-size: 14px;
        color: #888;
    }

    .success-rate-area {
        text-align: right;
    }

    #success-rate {
        font-size: 32px;
        font-weight: bold;
        color: #d4a373;
        /* 이미지의 황금색 계열 */
    }

    .success-rate-area p {
        font-size: 12px;
        color: #aaa;
        margin: 0;
        letter-spacing: 1px;
    }

    /* 프로그레스 바 */
    .plan-progress-bar {
        width: 100%;
        height: 12px;
        background: #f0ede9;
        border-radius: 10px;
        margin-bottom: 30px;
        overflow: hidden;
    }

    #progress-fill {
        height: 100%;
        background: #d4a373;
        transition: width 0.3s ease;
    }

    /* 리스트 아이템 */
    .plan-item {
        display: flex;
        align-items: center;
        background: #fff;
        border: 1.5px solid #f0f0f0;
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 15px;
        transition: all 0.2s;
        position: relative;
    }

    .plan-item:hover {
        border-color: #d4a373;
        transform: translateY(-2px);
    }

    /* 커스텀 체크박스 */
    .checkbox-wrapper {
        margin-right: 20px;
    }

    .checkbox-wrapper input[type="checkbox"] {
        display: none;
    }

    .checkbox-wrapper label {
        display: block;
        width: 24px;
        height: 24px;
        border: 2px solid #ccc;
        border-radius: 6px;
        cursor: pointer;
        position: relative;
    }

    .checkbox-wrapper input[type="checkbox"]:checked+label {
        background: #d4a373;
        border-color: #d4a373;
    }

    .checkbox-wrapper input[type="checkbox"]:checked+label::after {
        content: '✓';
        color: white;
        position: absolute;
        left: 4px;
        top: -2px;
        font-weight: bold;
    }

    /* 텍스트 정보 */
    .plan-info {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .plan-text {
        font-size: 18px;
        font-weight: 600;
        color: #444;
    }

    .plan-tag {
        font-size: 12px;
        color: #99abbd;
        font-weight: bold;
        margin-top: 4px;
    }

    /* 삭제 버튼 */
    .delete-btn {
        background: none;
        border: none;
        color: #ccc;
        font-size: 20px;
        cursor: pointer;
        padding: 5px;
    }

    .delete-btn:hover {
        color: #ff6b6b;
    }

    /* 입력창 */
    .plan-input-group {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    #new-plan-input {
        flex-grow: 1;
        padding: 12px 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        outline: none;
    }

    .add-btn {
        padding: 10px 20px;
        background: #d4a373;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }

    /* 추가된 동기화 액션 */
    .sync-actions {
        display: flex;
        gap: 15px;
        margin-bottom: 25px;
    }

    .tooltip-container {
        position: relative;
        flex: 1;
    }

    .sync-btn {
        width: 100%;
        padding: 14px;
        border-radius: 15px;
        border: 1.5px solid #d4a373;
        background: #fff;
        color: #d4a373;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        box-shadow: 0 4px 12px rgba(212, 163, 115, 0.1);
    }

    .sync-btn:hover {
        background: #fdf8f3;
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(212, 163, 115, 0.15);
    }

    .sync-btn.ai-btn {
        background: #d4a373;
        color: #fff;
    }

    .sync-btn.ai-btn:hover {
        background: #c39462;
    }

    .btn-desc {
        font-size: 11px;
        color: #99abbd;
        margin-top: 8px;
        display: block;
        line-height: 1.5;
        text-align: center;
        padding: 0 5px;
    }

    /* 로딩 상태 */
    .sync-btn.loading {
        opacity: 0.7;
        pointer-events: none;
    }

    /* 목록 창 */
    .plan-list{
        overflow-y: auto;
        height: 356px;
    }
</style>
{% endblock %}

{% block content %}
<div class="plan-container">
    <div class="plan-header">
        <div class="plan-title-area">
            <h2>오늘의 실행 플랜</h2>
            <p class="plan-subtitle">체크한 항목은 나의 관리 기록으로 저장됩니다.</p>
        </div>
        <div class="success-rate-area">
            <span id="success-rate">0%</span>
            <p>SUCCESS RATE</p>
        </div>
    </div>

    <div class="plan-progress-bar">
        <div id="progress-fill" style="width: 0%;"></div>
    </div>

    <!-- 동기화 및 추천 버튼 영역 -->
    <div class="sync-actions">
        <div class="tooltip-container">
            <button onclick="syncAlarms()" id="sync-alarms-btn" class="sync-btn" title="설정된 복약/측정 알람을 체크리스트로 불러옵니다.">
                <span>🔄</span> 알람 동기화
            </button>
            <span class="btn-desc">삭제한 복약/기록 알람을 <br>다시 불러옵니다.</span>
        </div>
        <div class="tooltip-container">
            <button onclick="recommendAI()" id="recommend-ai-btn" class="sync-btn ai-btn" title="AI가 건강 상태를 분석하여 맞춤 플랜을 추천합니다.">
                <span>✨</span> AI 추천 다시 받기
            </button>
            <span class="btn-desc">건강 정보를 바탕으로 <br>5개 플랜을 다시 생성합니다.</span>
        </div>
    </div>

    <!-- 플랜 리스트 -->
    <div id="plan-list" class="plan-list">
        <!-- 기본 아이템 예시 -->
    </div>

    <!-- 추가 입력창 -->
    <div class="plan-input-group">
        <input type="text" id="new-plan-input" placeholder="새로운 플랜을 입력하세요...">
        <button onclick="addItem()" class="add-btn">추가</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>


    // 달성률 업데이트 함수
    function updateProgress() {
        const checkboxes = document.querySelectorAll('.plan-item input[type="checkbox"]');
        const total = checkboxes.length;
        if (total === 0) {
            document.getElementById('success-rate').innerText = '0%';
            document.getElementById('progress-fill').style.width = '0%';
            return;
        }

        const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
        const percentage = Math.round((checked / total) * 100);

        document.getElementById('success-rate').innerText = percentage + '%';
        document.getElementById('progress-fill').style.width = percentage + '%';
    }

    // 아이템 목록 로드 함수
    async function loadItems() {
        const response = await fetchWithAuth('/api/v1/plan_check_list');
        if (!response || !response.ok) {
            console.error('Failed to load items');
            return;
        }
        const items = await response.json();
        const list = document.getElementById('plan-list');
        list.innerHTML = '';

        items.forEach(item => {
            const itemHtml = `
            <div class="plan-item" data-id="${item.id}">
                <div class="checkbox-wrapper">
                    <input type="checkbox" id="check-${item.id}" ${item.is_completed ? 'checked' : ''} onchange="toggleItem(${item.id})">
                    <label for="check-${item.id}"></label>
                </div>
                <div class="plan-info">
                    <span class="plan-text" style="${item.is_completed ? 'text-decoration: line-through; color: #aaa;' : ''}">${item.content}</span>
                    <span class="plan-tag">DAILY ACTION</span>
                </div>
                <button class="delete-btn" onclick="deleteItem(this)">×</button>
            </div>
        `;
            list.insertAdjacentHTML('beforeend', itemHtml);
        });
        updateProgress();
    }

    // 아이템 추가 함수
    async function addItem() {
        const input = document.getElementById('new-plan-input');
        const text = input.value.trim();
        if (!text) return;

        const response = await fetchWithAuth('/api/v1/plan_check_list', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ "content": text })
        });

        if (!response || !response.ok) {
            console.error('Failed to add item');
            return;
        }

        input.value = '';
        loadItems(); // 목록 새로고침
    }

    // 아이템 삭제 함수
    async function deleteItem(btn) {
        const msg = "정말 삭제하시겠습니까?\n\n(삭제된 항목은 '알람 동기화' 또는 'AI 추천 다시 받기' 버튼으로 다시 불러올 수 있습니다.)";
        if (confirm(msg)) {
            const itemId = btn.closest('.plan-item').dataset.id;
            const response = await fetchWithAuth('/api/v1/plan_check_list/' + itemId, {
                method: 'DELETE',
            });
            if (!response || !response.ok) {
                console.error('Failed to delete item');
                return;
            }
            btn.closest('.plan-item').remove();
            updateProgress();
        }
    }

    // 알람 동기화 함수
    async function syncAlarms() {
        const btn = document.getElementById('sync-alarms-btn');
        btn.classList.add('loading');
        btn.innerHTML = '<span>⏳</span> 동기화 중...';

        try {
            const response = await fetchWithAuth('/api/v1/plan_check_list/sync-alarms', {
                method: 'POST'
            });
            if (response && response.ok) {
                alert('알람 동기화가 완료되었습니다.');
                loadItems();
            } else {
                alert('동기화에 실패했습니다.');
            }
        } catch (e) {
            console.error(e);
        } finally {
            btn.classList.remove('loading');
            btn.innerHTML = '<span>🔄</span> 알람 동기화';
        }
    }

    // AI 추천 다시 받기 함수
    async function recommendAI() {
        const btn = document.getElementById('recommend-ai-btn');
        btn.classList.add('loading');
        btn.innerHTML = '<span>⏳</span> 생성 중...';

        try {
            const response = await fetchWithAuth('/api/v1/plan_check_list/recommend-ai', {
                method: 'POST'
            });
            if (response && response.ok) {
                alert('AI 추천 플랜이 새롭게 생성되었습니다.');
                loadItems();
            } else {
                alert('추천 플랜 생성에 실패했습니다.');
            }
        } catch (e) {
            console.error(e);
        } finally {
            btn.classList.remove('loading');
            btn.innerHTML = '<span>✨</span> AI 추천 다시 받기';
        }
    }

    // 아이템 토글 함수
    async function toggleItem(id) {
        const response = await fetchWithAuth(`/api/v1/plan_check_list/${id}/toggle`, {
            method: 'PATCH'
        });
        if (!response || !response.ok) {
            console.error('Failed to toggle item');
            loadItems(); // 상태 복구를 위해 리로드
            return;
        }
        const item = await response.json();
        const itemElement = document.querySelector(`.plan-item[data-id="${id}"]`);
        const textElement = itemElement.querySelector('.plan-text');
        if (item.is_completed) {
            textElement.style.textDecoration = 'line-through';
            textElement.style.color = '#aaa';
        } else {
            textElement.style.textDecoration = 'none';
            textElement.style.color = '#444';
        }
        updateProgress();
    }

    // 엔터키 입력 시 추가
    document.getElementById('new-plan-input')?.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addItem();
    });

    // 초기 실행
    window.onload = loadItems;
</script>
{% endblock %}
