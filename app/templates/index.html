{% extends "base.html" %}

{% block title %}Cloud9 Care - Dashboard{% endblock %}

{% block content %}
<style>
  /* ===== COMMON ===== */
  .banner {
    height: 260px;
    border: 1px solid #999;
    margin-bottom: 20px;
    background: #eef2ff;
    border-radius: 12px;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .card {
    border: 1px solid #e2e8f0;
    padding: 20px;
    height: auto;
    min-height: 160px;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    transition: transform 0.2s;
  }

  .card:hover {
    transform: translateY(-2px);
  }

  .card h4 {
    margin-bottom: 12px;
    font-size: 15px;
    color: #1e293b;
    font-weight: 700;
  }

  .card p {
    font-size: 13px;
    color: #64748b;
    line-height: 1.6;
  }

  .page-title {
    font-size: 22px;
    margin-bottom: 20px;
    font-weight: bold;
  }

  /* GLASSMORPHISM */
  .glassmorphism {
    background: rgba(255, 255, 255, 0.75);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    box-shadow: 0 10px 40px 0 rgba(31, 38, 135, 0.08);
  }
</style>

<section class="dashboard">
  <h2 class="page-title">대시보드</h2>
  <!-- 큰 배너 -->
  <div class="banner"></div>

  <!-- 카드 영역 -->
  <div class="card-grid">
    <div class="card">
      <h4>[ AI 맞춤 건강 요약 배너 ]</h4>
      <p>안녕하세요, OOO님 👋</p>
      <p>오늘 복약 2건 예정</p>
    </div>

    <div class="card">
      <h4>[ 오늘의 복약 알림 카드 ]</h4>
      <p>08:00 아침약</p>
      <p>20:00 저녁약</p>
    </div>

    <div class="card">
      <h4>[ 최근 분석 결과 ]</h4>
      <p>처방전 분석 결과</p>
    </div>

    <div class="card">
      <h4>[ AI 생활 가이드 ]</h4>
      <p>요약 3줄</p>
    </div>
  </div>
</section>
{% endblock %}
